<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator kosztów druku 3D</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<h1>Kalkulator kosztów druku 3D</h1>

<div class="card">

<label>Czas druku (godziny)</label>
<input type="number" id="time" placeholder="np. 5">

<label>Zużycie filamentu (gramy)</label>
<input type="number" id="weight" placeholder="np. 120">

<label>Rodzaj filamentu</label>
<select id="filament">
<option value="pla">PLA (55 zł/kg)</option>
<option value="petg">PETG (33 zł/kg)</option>
<option value="abs">ABS (65 zł/kg)</option>
<option value="tpu">TPU (45 zł/kg)</option>
</select>

</div>

<div class="card results">

<h2>Wyniki</h2>

<div class="resultItem">
<span>Materiał</span>
<span id="materialCost">0 zł</span>
</div>

<div class="resultItem">
<span>Energia</span>
<span id="energyCost">0 zł</span>
</div>

<div class="resultItem">
<span>Robocizna</span>
<span id="laborCost">0 zł</span>
</div>

<div class="total">
Koszt produkcji: <span id="totalCost">0 zł</span>
</div>

<div class="salePrice">
Sugerowana cena sprzedaży: <span id="salePrice">0 zł</span>
</div>

<div id="profitability"></div>

</div>

<div class="card">

<h2>Podział kosztów</h2>

<canvas id="costChart"></canvas>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
