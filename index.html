<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kalkulator kosztów druku 3D</title>

<link rel="icon" href="favicon.ico">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Kalkulator kosztów druku 3D</h1>

<form id="form">

<label>
⏱ Czas druku (np. 3:40)
<input type="text" id="czas" placeholder="np. 3:40">
</label>

<label>
📏 Ilość filamentu (gramy)
<input type="number" id="filament">
</label>

<label>
🧵 Rodzaj filamentu
<select id="filament_typ">

<option value="pla">PLA – 55 zł/kg</option>
<option value="petg">PETG – 60 zł/kg</option>
<option value="abs">ABS – 60 zł/kg</option>
<option value="tpu">TPU – 100 zł/kg</option>

</select>
</label>

</form>

<div id="wynik"></div>

<div class="cost-bar">
<div id="cost-fill"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
